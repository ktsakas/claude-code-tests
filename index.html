<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #e0e0e0;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #6ee7b7, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #status {
    font-size: 1.1rem;
    margin-bottom: 1.2rem;
    height: 1.5em;
    color: #94a3b8;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 6px;
  }
  .cell {
    width: 100px;
    height: 100px;
    background: #1e1e2e;
    border: 2px solid #2a2a3d;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, border-color 0.15s;
  }
  .cell:hover:not(.taken) {
    background: #282840;
    border-color: #3b82f6;
    transform: scale(1.04);
  }
  .cell.taken { cursor: default; }
  .cell.x { color: #6ee7b7; }
  .cell.o { color: #f472b6; }
  .cell.win {
    border-color: #facc15;
    background: #2a2a1a;
    animation: pop 0.35s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
  #restart {
    margin-top: 1.4rem;
    padding: 0.6rem 2rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #6ee7b7, #3b82f6);
    color: #0f0f1a;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #restart:hover { opacity: 0.85; }
  #score {
    margin-top: 1rem;
    font-size: 0.95rem;
    color: #64748b;
  }
  #score span { font-weight: 700; }
  .score-x { color: #6ee7b7 !important; }
  .score-o { color: #f472b6 !important; }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="status">Your turn (X)</div>
<div id="board"></div>
<button id="restart">New Game</button>
<div id="score">
  <span class="score-x">X: <span id="sx">0</span></span> &nbsp;|&nbsp;
  Draws: <span id="sd">0</span> &nbsp;|&nbsp;
  <span class="score-o">O: <span id="so">0</span></span>
</div>

<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
const restartBtn = document.getElementById('restart');
const sx = document.getElementById('sx');
const so = document.getElementById('so');
const sd = document.getElementById('sd');

const WINS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let cells, state, turn, over, scores = {X:0, O:0, D:0};

function init() {
  board.innerHTML = '';
  state = Array(9).fill('');
  turn = 'X';
  over = false;
  status.textContent = 'Your turn (X)';
  cells = [];
  for (let i = 0; i < 9; i++) {
    const div = document.createElement('div');
    div.className = 'cell';
    div.addEventListener('click', () => play(i));
    board.appendChild(div);
    cells.push(div);
  }
}

function play(i) {
  if (over || state[i] || turn !== 'X') return;
  place(i, 'X');
  if (!over && state.includes('')) {
    turn = 'O';
    status.textContent = 'AI thinking...';
    setTimeout(aiMove, 300);
  }
}

function place(i, mark) {
  state[i] = mark;
  cells[i].textContent = mark;
  cells[i].classList.add('taken', mark.toLowerCase());
  const win = checkWin(mark);
  if (win) {
    over = true;
    win.forEach(j => cells[j].classList.add('win'));
    status.textContent = mark === 'X' ? 'You win!' : 'AI wins!';
    scores[mark]++;
    updateScore();
  } else if (!state.includes('')) {
    over = true;
    status.textContent = "It's a draw!";
    scores.D++;
    updateScore();
  }
}

function checkWin(mark) {
  for (const w of WINS) {
    if (w.every(i => state[i] === mark)) return w;
  }
  return null;
}

function aiMove() {
  const i = bestMove();
  place(i, 'O');
  if (!over) {
    turn = 'X';
    status.textContent = 'Your turn (X)';
  }
}

function bestMove() {
  let best = -Infinity, move = -1;
  for (let i = 0; i < 9; i++) {
    if (state[i]) continue;
    state[i] = 'O';
    const s = minimax(false, -Infinity, Infinity);
    state[i] = '';
    if (s > best) { best = s; move = i; }
  }
  return move;
}

function minimax(isMax, alpha, beta) {
  if (checkWin('O')) return 1;
  if (checkWin('X')) return -1;
  if (!state.includes('')) return 0;
  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (state[i]) continue;
      state[i] = 'O';
      best = Math.max(best, minimax(false, alpha, beta));
      state[i] = '';
      alpha = Math.max(alpha, best);
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (state[i]) continue;
      state[i] = 'X';
      best = Math.min(best, minimax(true, alpha, beta));
      state[i] = '';
      beta = Math.min(beta, best);
      if (beta <= alpha) break;
    }
    return best;
  }
}

function updateScore() {
  sx.textContent = scores.X;
  so.textContent = scores.O;
  sd.textContent = scores.D;
}

restartBtn.addEventListener('click', init);
init();
</script>
</body>
</html>
